# npm + Netlify: stale dependency cache + `npm install` can hit npm/arborist
# ERR_INVALID_ARG_TYPE (npm/cli#4907). Prefer a clean lockfile install on CI.
#
# If `installCommand` below is not applied (check deploy log for this exact shell
# command), set the same string under Site configuration → Build & deploy →
# Continuous deployment → Build settings → Install command, and use
# "Clear cache and retry deploy" once after lockfile changes.
[build]
  installCommand = "rm -rf node_modules && npm ci"
  command = "npm run build"
  publish = "build"
