# File-based build settings override the Netlify UI. Documented [build] keys are
# mainly base, publish, command, processing — see:
# https://docs.netlify.com/build/configure-builds/file-based-configuration/#build-settings
#
# Default JS install is described here (npm install when package-lock.json is present):
# https://docs.netlify.com/build/configure-builds/manage-dependencies/#npm
#
# To force a lockfile-only install, run npm ci in the build command (Netlify may
# still run its default install first; npm ci then replaces node_modules from the lockfile).
[build]
  command = "npm ci && npm run build"
  publish = "build"
