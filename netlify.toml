# Netlify restores cached node_modules then runs npm install by default. That
# combination can trigger npm/arborist ERR_INVALID_ARG_TYPE ("from" undefined);
# switching the install step to a clean npm ci avoids it. See npm/cli#4907.
#
# Documented [build] keys: https://docs.netlify.com/build/configure-builds/file-based-configuration/#build-settings
[build]
  installCommand = "rm -rf node_modules && npm ci"
  command = "npm run build"
  publish = "build"
